name: DOCX to Screenshot

on:
  push:
    paths:
      - '**.docx'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need the previous commit to diff against

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install python-docx matplotlib Pillow

      - name: Detect added or modified .docx files
        id: detect
        run: |
          # Determine the base commit to diff against.
          # On the very first push to a branch HEAD~1 may not exist, so fall
          # back to the empty-tree SHA in that case.
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            BASE="HEAD~1"
          else
            BASE="$(git hash-object -t tree /dev/null)"
          fi

          # Write file list to a temp file so spaces in names are preserved.
          TMPFILE=$(mktemp)
          git diff --name-only --diff-filter=AM "$BASE" HEAD -- '*.docx' > "$TMPFILE"

          if [ ! -s "$TMPFILE" ]; then
            echo "No .docx files detected."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "Detected .docx files:"
            cat "$TMPFILE"
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

          # Store the path to the file list for subsequent steps.
          echo "filelist=${TMPFILE}" >> "$GITHUB_OUTPUT"

      - name: Convert .docx files to screenshots
        if: steps.detect.outputs.has_files == 'true'
        run: |
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Converting: $f"
            python scripts/docx_to_image.py "$f"
          done < "${{ steps.detect.outputs.filelist }}"

      - name: Remove original .docx files
        if: steps.detect.outputs.has_files == 'true'
        run: |
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            git rm --force "$f"
            echo "Removed: $f"
          done < "${{ steps.detect.outputs.filelist }}"

      - name: Commit and push screenshot(s)
        if: steps.detect.outputs.has_files == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all
          # Only commit if there is something staged.
          if ! git diff --staged --quiet; then
            git commit -m "chore: convert docx to screenshot and remove original [skip ci]"
            git push
          else
            echo "Nothing to commit — screenshots may already be up to date."
          fi
