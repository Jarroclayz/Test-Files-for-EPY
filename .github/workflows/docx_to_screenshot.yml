name: DOCX to Questions

on:
  push:
    paths:
      - '**.docx'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-docx

      - name: Detect added or modified .docx files
        id: detect
        run: |
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            BASE="HEAD~1"
          else
            BASE="$(git hash-object -t tree /dev/null)"
          fi
          TMPFILE=$(mktemp)
          git diff --name-only --diff-filter=AM "$BASE" HEAD -- '*.docx' > "$TMPFILE"
          if [ ! -s "$TMPFILE" ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi
          echo "filelist=${TMPFILE}" >> "$GITHUB_OUTPUT"

      - name: Extract questions
        if: steps.detect.outputs.has_files == 'true'
        run: |
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            python scripts/extract_questions.py "$f"
          done < "${{ steps.detect.outputs.filelist }}"

      - name: Remove .docx files
        if: steps.detect.outputs.has_files == 'true'
        run: |
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            git rm --force "$f"
          done < "${{ steps.detect.outputs.filelist }}"

      - name: Commit
        if: steps.detect.outputs.has_files == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all
          if ! git diff --staged --quiet; then
            git commit -m "chore: remove processed .docx [skip ci]"
            git push
          fi

      - name: Post to GitHub Issue
        if: steps.detect.outputs.has_files == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ISSUE_NUMBER=$(gh issue list --repo "$REPO" --state open --search "EPY Questions" --json number --jq '.[0].number')
          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_NUMBER=$(gh issue create --repo "$REPO" --title "EPY Questions" --body "Questions extracted from uploaded Word documents." --json number --jq '.number')
          fi
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            STEM=$(basename "$f" .docx)
            QF="${STEM}_questions.txt"
            if [ -f "$QF" ]; then
              gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "**Questions from \`${f}\`:**$(echo ""; cat "$QF")"
              rm -f "$QF"
            fi
          done < "${{ steps.detect.outputs.filelist }}"
